{% set name = "hn2016_falwa" %}
{% set version = "0.7.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  path: ../

requirements:
  build:
    - python==3.10
    - numpy==1.22.3
    - gfortran
  run:
    - python==3.10
    - numpy==1.22.3
    - gfortran

test:
  imports:
    - hn2016_falwa

about:
  home: https://github.com/csyhuang/hn2016_falwa
  license: MIT
  license_family: MIT
  summary: Finite amplitude local wave activity package